spring.application.name=todo-dev

# Docker Compose will automatically configure datasource from compose.yaml
# These values match the compose.yaml configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/todo_db
spring.datasource.username=todo_user
spring.datasource.password=todo_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Docker Compose support (auto-enabled when compose.yaml exists)
spring.docker.compose.enabled=true
spring.docker.compose.file=compose.yaml
spring.docker.compose.lifecycle-management=start_and_stop
spring.docker.compose.start.command=up
spring.docker.compose.stop.command=down
spring.docker.compose.stop.timeout=1m

# Logging
logging.level.org.springframework.boot.docker.compose=DEBUG
logging.level.org.hibernate.SQL=DEBUG
